<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Hero — {{ marca }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #1a1a2e;
        }

        /* Top bar */
        .topbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 12px;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1.5px solid #e5e7eb;
            white-space: nowrap;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .back-btn:hover { background: #f3f4f6; }
        .topbar-title {
            font-size: 0.95rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .topbar-badge {
            font-size: 0.75rem;
            color: white;
            background: #22c55e;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .topbar-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .download-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .download-btn:hover { opacity: 0.85; }

        /* Preview frame */
        .preview-wrapper {
            width: 100%;
            height: calc(100vh - 57px);
        }
        .preview-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 540px) {
            .topbar-badge { display: none; }
            .download-btn span { display: none; }
            .topbar { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <a href="/" class="back-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
            </svg>
            Editar
        </a>
        <div class="topbar-title">{{ marca }}</div>
        <span class="topbar-badge">Listo</span>
    </div>

    <div class="topbar-actions">
        <button class="download-btn" onclick="descargar()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            <span>Descargar HTML</span>
        </button>
    </div>
</div>

<div class="preview-wrapper">
    <iframe class="preview-frame" id="preview-frame"></iframe>
</div>

<script>
    const htmlContent = {{ html_output | tojson }};
    document.getElementById('preview-frame').srcdoc = htmlContent;

    function descargar() {
        const blob = new Blob([htmlContent], { type: 'text/html; charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'hero_{{ marca | lower | replace(" ", "_") }}.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
